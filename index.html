<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota - Jogos do Dia</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');

        :root {
            --primary: #00ff88;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* LINHAS DE FUNDO ANIMADAS */
        .bg-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 10% 100%;
            pointer-events: none;
        }

        .bg-lines::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: moveLines 6s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateY(0%); }
            100% { transform: translateY(200%); }
        }

        /* WRAPPER PRINCIPAL */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 0;
            background: 
                radial-gradient(circle at center, rgba(2, 2, 2, 0.4) 0%, var(--bg) 95%),
                url('jp-direto.jpg') center/cover no-repeat fixed;
        }

        .header-section { width: 100%; text-align: center; }
        
        .section-label { 
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 4px; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* CARROSSEL */
        .carousel-container { display: flex; width: 100%; overflow: hidden; padding: 10px 0; }
        .carousel-track { display: flex; gap: 20px; animation: scroll 25s linear infinite; padding-left: 20px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-width: 260px;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .teams-row { display: flex; align-items: center; justify-content: space-around; gap: 10px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .vs { font-weight: 900; color: var(--primary); font-size: 18px; }

        /* HEADLINE COM FONTE KANIT */
        .headline { 
            font-family: 'Kanit', sans-serif;
            font-size: clamp(32px, 10vw, 48px); 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase; 
            margin: 40px 0;
            line-height: 1.1;
            padding: 0 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* BOTÃO ORIGINAL (VERDE NEON) */
        .footer-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 20px; }

        .btn-container { width: 100%; max-width: 380px; margin-bottom: 15px; animation: pulse 2s infinite ease-in-out; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 18px; overflow: hidden; display: block; text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; background: #0a0a0a; color: #fff; padding: 22px; border-radius: 16px;
            font-size: 18px; font-weight: 900; text-transform: uppercase; display: block; z-index: 5; text-align: center;
        }

        /* CAIXA DE AVISO */
        .alert-box {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 5px;
            backdrop-filter: blur(10px);
        }

        .alert-box p { font-size: 13px; color: #fff; line-height: 1.4; text-align: center; }
        .alert-box span { color: #ff8800; font-weight: bold; }

    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="lp-wrapper">
        
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Internacional.png" alt=""><span>Inter</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1776.png" alt=""><span>São Paulo</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <h1 class="headline">BILHETE<br><span style="color: var(--primary)">LIBERADO</span></h1>
        </div>

        <div class="footer-section">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam">
                    <span class="btn-content">🔥 PEGAR BILHETE</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
